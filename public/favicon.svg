<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#grad2)" />

  <!-- Subtle inner glow ring -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#grad1)" stroke-width="1.5" stroke-opacity="0.5" />

  <!-- Letter S -->
  <text
    x="10"
    y="46"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#grad1)"
    letter-spacing="-1"
  >SM</text>

  <!-- Bottom accent line -->
  <rect x="10" y="52" width="44" height="2.5" rx="1.5" fill="url(#grad1)" opacity="0.7" />
</svg>
